# MES MVP — v1_baseline + trailing ATR stop.
#
# Tests whether asymmetric R:R via trailing stop flips the strategy's
# expectancy from negative (per v1_baseline at -0.476 R/trade) to
# positive. Per the MVP findings (commit 6953eef), the win rate is
# stuck at ~30%; with symmetric R:R that's a structural loser. Adding
# a trail lets winners run beyond their initial-R limit while losers
# still cap at the initial ATR stop — converting the R:R asymmetry
# into expected-value asymmetry.
#
# Theory: trail kicks in immediately. Winners trail peak by 1.5×ATR,
# losers cap at 1.0×ATR initial stop. Asymmetry = (peak excursion -
# 1.5×ATR) for wins vs (-1.0×ATR) for losses.

metadata:
  id: mes_mvp_regime_gated_v4_trailing
  version: 0.1.0
  schema_version: "1.0"
  name: MES MVP regime-gated OR30 fade — trailing ATR stop, immediate
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_mvp_regime_gated_v1_baseline
  description: >
    v1 baseline (range_break_fade, OR30, regime-gated) plus
    trailing_atr stop adjustment with multiplier 1.5 and no activation
    threshold. Tier proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: range_break_fade
  parameters:
    upper_level_feature_id: mes_or30_high
    lower_level_feature_id: mes_or30_low
    breakout_lookback_bars: 5
    re_entry_buffer_ticks: 1
    tick_size: 0.25
    max_attempts_per_session: 1
    direction_mode: both
  direction: both
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.10
        hi: 0.85
    - condition: feature_threshold
      parameters:
        feature_id: vix_daily_pctile_252
        operator: lt
        threshold: 0.50
    - condition: feature_threshold
      parameters:
        feature_id: mes_econ_event_quiet_window_flag
        operator: lte
        threshold: 0.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: atr_multiple
    atr_feature_id: mes_atr_14m
    atr_mult: 1.0
    tick_size: 0.25
  adjustment_rules:
    - action: trailing_atr
      atr_feature_id: mes_atr_14m
      multiplier: 1.5
      activation_R: 0.0
      tick_size: 0.25
  hard_max_distance_ticks: 100
  time_stop:
    enabled: true
    max_holding_bars: 60  # bumped from 30: trailing needs more time
                         # for winners to mature; 30 was a hard time-cap
                         # symmetric with the symmetric-R:R version.
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions: []
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
