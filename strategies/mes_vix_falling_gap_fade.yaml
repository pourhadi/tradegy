# MES VIX-falling gap fade.
#
# Pre-registered 2026-05-10 for doc 16. This is a low/compressing-vol gap
# fade, not a high-vol discretionary fade.

metadata:
  id: mes_vix_falling_gap_fade
  version: 0.1.0
  schema_version: "1.0"
  name: MES gap fade when VIX is low and falling
  status: retired
  created_date: 2026-05-10
  last_modified_date: 2026-05-10
  author: gpt-5.5
  reviewers: []
  parent_strategy_id: mes_mvp_gap_fill_fade
  description: >
    KILLED 2026-05-10. Fade overnight gaps toward the prior RTH close only when VIX is in the
    lower half of its 252-day percentile and has fallen over the prior five
    trading days. Tier proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: gap_fill_fade
  parameters:
    prior_close_feature_id: mes_prior_rth_close
    gap_threshold_pct: 0.003
    max_attempts_per_session: 1
    direction_mode: both
  direction: both
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.0
        hi: 0.40
    - condition: feature_threshold
      parameters:
        feature_id: vix_daily_pctile_252
        operator: lt
        threshold: 0.50
    - condition: feature_threshold
      parameters:
        feature_id: vix_daily_5d_change
        operator: lt
        threshold: 0.0
    - condition: feature_threshold
      parameters:
        feature_id: mes_econ_event_quiet_window_flag
        operator: lte
        threshold: 0.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: atr_multiple
    atr_feature_id: mes_atr_14m
    atr_mult: 1.0
    tick_size: 0.25
    max_distance_ticks: 400
  adjustment_rules: []
  hard_max_distance_ticks: 400
  time_stop:
    enabled: true
    max_holding_bars: 60
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions:
    - condition: r_multiple_target
      parameters:
        target_R: 2.0
      action: exit_market
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: false
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
