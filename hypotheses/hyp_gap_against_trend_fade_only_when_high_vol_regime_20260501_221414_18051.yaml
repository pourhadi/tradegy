id: hyp_gap_against_trend_fade_only_when_high_vol_regime_20260501_221414_18051
title: Gap-against-trend fade only when high-vol regime AND price reclaims prior RTH
  close
status: proposed
source: llm_brainstorm
created_date: '2026-05-01'
last_modified_date: '2026-05-01'
author: claude-opus-4-7
observation: Overnight gaps that open >0.5*ATR away from mes_prior_rth_close, occurring
  on a high realized-30m-vol regime (top tercile), tend to fade back to the prior
  close — but ONLY after price has already traded back through prior_rth_close within
  the first 30 minutes of NYSE.
mechanism: Large gaps in high-vol regimes are typically driven by overnight headline-driven
  liquidity vacuums, not persistent information. Real-money desks anchor to the prior
  settlement for mark-to-market and rebalance toward it during NYSE hours when liquidity
  returns. The reclaim of prior_rth_close is the confirmation that supply/demand has
  flipped — entering before reclaim catches falling knives (the round-1 single-feature
  OR30 fade failure mode), entering only after reclaim selects for the regime where
  mean-reversion flow has begun. Low-vol gaps are usually 'real' (drift) and should
  not be faded; the vol gate filters those out.
falsification: Refuted if, on >=60 qualifying signals, the median trade fails to retrace
  at least 50% of the gap (entry to gap-fill target) within the same RTH session,
  OR if the strategy's edge disappears when vol-regime gate is removed (meaning the
  reclaim alone carries all the signal). Also refuted if hit rate <55% on reaching
  0.75*gap-size before stop at 0.5*ATR beyond entry.
counterparty: Overnight momentum chasers and stop-loss orders placed at prior close
  by retail; absorbed by institutional rebalancers.
