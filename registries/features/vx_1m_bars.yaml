# 1-minute OHLCV bars for front-month VX futures from Sierra Chart SCID.

id: vx_1m_bars
version: v1
description: >
  1-minute OHLCV bars for CFE VX front-month futures, sourced from the
  admitted vx_1m_ohlcv Sierra Chart SCID data source. The resample transform
  normalizes timestamps to the repo's right-labeled bar-close convention.
type: derived
inputs:
  - source_id: vx_1m_ohlcv
computation:
  type: registered_transform
  transform_id: resample_ohlcv_bars
  parameters:
    cadence: 1m
    bar_close_label: right
    closed: left
cadence: 1m
availability_latency_seconds: 1
derivation: transform
revisable: false
expected_range:
  min: 0.0
  max: 200.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
