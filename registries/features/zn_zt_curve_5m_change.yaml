# 5-minute percentage change in the ZN/ZT price ratio.

id: zn_zt_curve_5m_change
version: v1
description: >
  Five-bar percentage change in zn_zt_close_ratio. Positive values indicate
  ZN strength relative to ZT over the last five minutes; used as a simple
  intraday curve-steepening/long-end confirmation proxy.
type: derived
inputs:
  - feature_id: zn_zt_close_ratio
computation:
  type: registered_transform
  transform_id: rolling_change
  parameters:
    lag_bars: 5
    column: value
    mode: pct
cadence: 1m
availability_latency_seconds: 1
derivation: transform
revisable: false
expected_range:
  min: -1.0
  max: 1.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
