# MES pre-FOMC drift — late-morning intraday window only.
#
# The intraday Lucca-Moench drift is concentrated in the 2-3 hours
# leading up to the FOMC announcement. Earlier morning hours (~9:30-
# 12:00 ET) have weaker drift; the late-morning concentration is
# where the "uncertainty premium" is most aggressively priced in.
#
# This spec restricts to the 12:00-13:30 ET window (0.5-2.5 hours
# pre-FOMC). Pure intraday, ~90 min hold.

metadata:
  id: mes_pre_fomc_drift_late_morning
  version: 0.1.0
  schema_version: "1.0"
  name: MES pre-FOMC drift — late-morning intraday (12:00-13:30 ET)
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_pre_fomc_drift_intraday
  description: >
    Long MES during the 12:00-13:30 ET window on FOMC-statement days
    (0.5-2.5h pre-announce). Tier proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: gated_entry
  parameters:
    direction: long
    max_attempts_per_session: 1
  direction: long
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    # XNYS session, late morning (~12:00 ET → ~13:30 ET).
    # 12:00 ET = (12:00 - 09:30) / 6.5h = 0.385
    # 13:30 ET = (13:30 - 09:30) / 6.5h = 0.615
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.38
        hi: 0.62
    # Within 0.5-2.5 hours of next FOMC announcement.
    - condition: feature_range
      parameters:
        feature_id: mes_hours_to_next_fomc
        lo: 0.5
        hi: 2.5

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: fixed_ticks
    stop_ticks: 200
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 1000
  time_stop:
    enabled: true
    max_holding_bars: 90  # 1.5 hour hold
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions:
    - condition: feature_threshold
      parameters:
        feature_id: mes_hours_to_next_fomc
        operator: lt
        threshold: 0.5
      action: exit_market
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
