# 252-day percentile rank of VIX daily close.
#
# Phase 1 regime feature. Projects the VIX level onto a regime-relative
# scale (0 = lowest in trailing year, 1 = highest). Strategies key on
# this rather than absolute VIX because the absolute scale shifts over
# decades (mean VIX 2010-2019 ~= 17, mean 2020+ ~= 22). The percentile
# rank stays roughly comparable.
#
# 252 trading days ≈ 1 year. The rank computation uses fractional
# tiebreaking (count-strictly-less + half-count-equal) so the metric
# behaves smoothly on plateaus.

id: vix_daily_pctile_252
version: v1
description: >
  Percentile rank of vix_daily_close within its trailing 252-day
  window. Output in [0, 1]; daily cadence aligned to the 16:00 ET
  close. The first 251 days of the source's coverage are dropped (the
  rank isn't meaningful on a partial window).
type: derived
inputs:
  - feature_id: vix_daily_close
computation:
  type: registered_transform
  transform_id: rolling_percentile_rank
  parameters:
    window_bars: 252
    column: value
cadence: 1d
availability_latency_seconds: 0
derivation: transform
revisable: false
expected_range:
  min: 0.0
  max: 1.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
