# MES MVP — control: VIX gate REMOVED.
#
# Ablation control. Tests the marginal contribution of the VIX
# percentile gate. If v3 ≈ v1, the VIX gate isn't doing much and
# expanding it (e.g., to LLM regime classification) is unlikely to
# add edge. If v3 markedly underperforms v1, the VIX gate IS load-
# bearing and a richer regime classifier is likely to help further.

metadata:
  id: mes_mvp_regime_gated_v3_no_vix_ablation
  version: 0.1.0
  schema_version: "1.0"
  name: MES MVP regime-gated OR30 failed-breakout fade — no VIX gate (control)
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_mvp_regime_gated_v1_baseline
  description: >
    Same as v1 baseline with the VIX percentile gate REMOVED. All
    other gates (time_of_session, econ-quiet-flag) preserved. Tier
    proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: range_break_fade
  parameters:
    upper_level_feature_id: mes_or30_high
    lower_level_feature_id: mes_or30_low
    breakout_lookback_bars: 5
    re_entry_buffer_ticks: 1
    tick_size: 0.25
    max_attempts_per_session: 1
    direction_mode: both
  direction: both
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.10
        hi: 0.85
    - condition: feature_threshold
      parameters:
        feature_id: mes_econ_event_quiet_window_flag
        operator: lte
        threshold: 0.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: atr_multiple
    atr_feature_id: mes_atr_14m
    atr_mult: 1.0
    tick_size: 0.25
    # Bumped from default 100 ticks to 400 (100 pts). Without the VIX
    # gate the strategy attempts entries on extreme-vol days (e.g.
    # 2020-03-16) where ATR_14m × 1.0 = 25.6 pts > the default 25 pt
    # cap. Bumping so the ablation runs end-to-end. v1 and v2 don't
    # hit the cap because the VIX gate filters those days out.
    max_distance_ticks: 400
  adjustment_rules: []
  hard_max_distance_ticks: 400
  time_stop:
    enabled: true
    max_holding_bars: 30
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions: []
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
