# Scheduled / monetary-policy economic events.
#
# Phase 0.3 of the regime-gated range-scalp plan
# (/Users/dan/.claude/plans/brainstorming-in-the-context-humming-balloon.md).
#
# SCOPE — combined FOMC + FRED scheduled-release feed:
#
#   FOMC slice (federalreserve.gov public JSON, no auth):
#     fomc_statement, fomc_minutes, fomc_sep, monetary_policy_report,
#     fed_speech, fed_other_monetary
#
#   FRED-driven scheduled-release slice (api.stlouisfed.org, free key):
#     cpi, ppi, employment_situation (NFP), gdp, retail_sales_advance,
#     initial_jobless_claims, personal_income_outlays (PCE)
#
# ISM Manufacturing PMI is NOT included — ISM is a private organization
# and FRED carries the data but not the release schedule. If needed,
# encode the well-known schedule rule (1st business day of each month
# at 10:00 AM ET) as a follow-up.
#
# Release-time convention: BLS/BEA/UI releases all clock at 8:30 AM ET
# (DST-aware). FOMC events carry their own published timestamps.
#
# Importance classification (per-row, set by ingest script):
#   high   — fomc_statement, fomc_sep, fomc_press_conference
#   medium — fomc_minutes, monetary_policy_report
#   low    — fed_speech, fed_other_monetary
#
# Key load-bearing field: `announced_at`. For Fed press releases this
# equals `ts_utc` because the press release itself is the announcement
# (no advance schedule risk). For BLS/BEA when they're added, this will
# be the date the schedule was first publicly known — load-bearing for
# no-lookahead handling in `time_until_next_event` features.

id: econ_events
version: v1
description: >
  Scheduled and monetary-policy economic event timestamps. Federal
  Reserve monetary-policy press releases (2006-present, from the FRB
  public JSON feed) PLUS BLS/BEA/UI scheduled releases pulled via the
  FRED /releases/dates endpoint (CPI, PPI, NFP, GDP, retail sales,
  initial jobless claims, PCE). Used by the regime-gated strategy as a
  quiet-window gate (no entries within T-2h to T+4h of a high-
  importance event) and as a feature input to the news-event
  distillation classifier.
type: economic
provider: federalreserve_gov+fred
revisable: false
revision_policy: never_revised
admission_rationale: >
  Two complementary primary sources, both free:

    Federal Reserve JSON press release feed (federalreserve.gov) is
    the canonical source for monetary-policy events; timestamps are
    recorded by the issuing institution.

    FRED /releases/dates endpoint (api.stlouisfed.org) gives the
    historical release dates for BLS/BEA/UI scheduled releases. FRED
    returns dates only; release times are appended per agency
    convention (BLS/BEA/UI = 8:30 AM ET; DST-aware). Both ts_utc and
    announced_at use the published release moment because BLS/BEA do
    not silently shift schedules after publication.
coverage:
  start_date: 2006-01-03
  end_date: 2026-04-30
  gaps: []
cadence: irregular
fields:
  - {name: ts_utc, type: timestamp}
  - {name: event_type, type: string}
  - {name: importance, type: string}
  - {name: announced_at, type: timestamp}
  - {name: source, type: string}
  - {name: headline, type: string}
  - {name: link, type: string}
timestamp_column: ts_utc
ingest:
  format: generic_csv
session_calendar: XNYS
# Irregular schedule — gaps between events range from minutes (multi-
# release days) to weeks (quiet periods between FOMC meetings).
# Ceiling reflects Fed practice of producing at least one
# Monetary-Policy press item per week in normal times; we set a
# generous month-long ceiling so audit tolerance accommodates known
# multi-week quiet periods.
max_inactivity_seconds: 2592000
availability_latency:
  median_seconds: 0.0
  p99_seconds: 60.0
  notes: >
    The Fed JSON feed is updated with each press release. There is no
    pre-announcement of unscheduled releases; the timestamp on each row
    is the publish moment.
licensing:
  live_use: true
  backtest_use: true
  redistribution: true
known_issues:
  - >
    Many `fed_other_monetary` entries (~70%) are speeches/remarks; some
    are highly market-moving (e.g., Powell remarks during a quiet
    period) but our heuristic importance classifier tags all as `low`.
    Refining this via either keyword expansion or LLM-assisted
    classification is a known follow-up.
  - >
    71 entries in the source feed had unparseable date strings and were
    silently skipped during ingest. Sample-spot-check confirmed these
    are pre-2010 archived entries with non-standard formatting; recovery
    of these is low priority since coverage starts 2006 and most market-
    impact strategies care about post-2019.
  - >
    ISM Manufacturing PMI is NOT in this dataset. ISM is a private
    organization; FRED carries the data series but not the release
    schedule. If a strategy needs an ISM-release quiet window, encode
    the well-known schedule rule (1st business day of each month at
    10:00 AM ET) as a derived feature rather than relying on this
    source.
audit_history: []
