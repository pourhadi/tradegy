# Intermediate feature: 1-minute OHLCV bars resampled from ES tick prints.
#
# Schema mirrors trading_platform_docs/02_feature_pipeline.md:362-406.

id: es_1m_bars
version: v1
description: 1-minute OHLCV bars from ES tick prints, right-labeled bar close.
type: derived
inputs:
  - source_id: es_ticks
computation:
  type: registered_transform
  transform_id: resample_ohlcv
  parameters:
    cadence: 1m
    bar_close_label: right
cadence: 1m
availability_latency_seconds: 1
derivation: transform
revisable: false
expected_range:
  min: 0.0
  max: 100000.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
