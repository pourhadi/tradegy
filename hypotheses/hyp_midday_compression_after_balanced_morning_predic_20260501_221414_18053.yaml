id: hyp_midday_compression_after_balanced_morning_predic_20260501_221414_18053
title: Midday compression after balanced morning predicts afternoon trend break, conditional
  on volume dry-up
status: promoted
source: llm_brainstorm
created_date: '2026-05-01'
last_modified_date: '2026-05-01'
author: claude-opus-4-7
observation: When the morning (session_pos 0.0-0.4) closes with price within OR30
  range AND realized 5m vol falls into the bottom quartile of the 30m realized vol
  distribution AND volume z-score is negative (<-0.5) heading into session_pos ~0.5,
  the subsequent break of the morning's range tends to trend through the close.
mechanism: A balanced morning that fails to break OR30 indicates two-sided positioning
  with no inventory imbalance. The volume dry-up at midday signals liquidity providers
  have stepped back and inventory is flat. When a directional break finally occurs
  in the afternoon, it triggers stop runs from both sides of the balanced positioning
  AND forces market makers to widen and chase, since their inventory was symmetric.
  The combination of (range-bound morning) + (vol compression) + (negative volume
  z) is the classic coiled-spring setup; any single one of these is too common to
  carry edge — the conjunction is rare and selects for the regime where break-and-go
  dominates over break-and-fail.
falsification: Refuted if, across >=50 qualifying setups, the post-midday break fails
  to extend at least 1.0*mes_atr_14m beyond OR30 boundary in the break direction by
  session close >=55% of the time, OR if the win rate of the break-continuation entry
  (target 1.5*ATR, stop 0.6*ATR) is <=48%. Additionally refuted if compression-only
  variants (no volume-z gate) match performance, indicating the volume condition adds
  no edge.
counterparty: Symmetrically-positioned market makers forced to chase after inventory
  neutrality breaks; trapped fade traders from the morning balanced range.
