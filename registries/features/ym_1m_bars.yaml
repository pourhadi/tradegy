# 1-minute OHLCV bars for YM from the admitted Sierra Chart SCID source.

id: ym_1m_bars
version: v1
description: >
  1-minute OHLCV bars for YM front-month continuous, sourced from the admitted
  ym_1m_ohlcv Sierra Chart SCID source via resample_ohlcv_bars. Right-labeled
  close, left-closed window so each bar's ts_utc is the bar-close instant.
type: derived
inputs:
  - source_id: ym_1m_ohlcv
computation:
  type: registered_transform
  transform_id: resample_ohlcv_bars
  parameters:
    cadence: 1m
    bar_close_label: right
    closed: left
cadence: 1m
availability_latency_seconds: 1
derivation: transform
revisable: false
expected_range:
  min: 0.0
  max: 100000.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
