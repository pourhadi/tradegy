# MES MVP — volume-spike fade with regime gates + 2R target.
#
# Mechanic-search variant per user directive 2026-05-04. Distinct
# entry mechanic: volume-zscore spike + failed-follow-through, not
# price level reference at all.
#
# Mechanic premise: a 1m bar with extreme volume often reflects a
# forced flow event (margin call, blow-off, liquidity crisis); if the
# next bar fails to extend in the same direction, the spike was
# exhaustion. Fade.

metadata:
  id: mes_mvp_volume_spike_fade
  version: 0.1.0
  schema_version: "1.0"
  name: MES MVP volume-spike fade — regime-gated, 2R target
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: null
  description: >
    Fade volume z-score spikes whose next bar fails to follow through.
    Regime gates same as MVP series; 2R r_multiple_target exit.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: volume_spike_fade
  parameters:
    volume_zscore_feature_id: mes_volume_zscore_20m
    zscore_threshold: 2.5
    directional_close_pct: 0.75
    max_attempts_per_session: 1
    direction_mode: both
  direction: both
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.10
        hi: 0.85
    - condition: feature_threshold
      parameters:
        feature_id: vix_daily_pctile_252
        operator: lt
        threshold: 0.50
    - condition: feature_threshold
      parameters:
        feature_id: mes_econ_event_quiet_window_flag
        operator: lte
        threshold: 0.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: atr_multiple
    atr_feature_id: mes_atr_14m
    atr_mult: 1.0
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 100
  time_stop:
    enabled: true
    max_holding_bars: 60
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions:
    - condition: r_multiple_target
      parameters:
        target_R: 2.0
      action: exit_market
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
