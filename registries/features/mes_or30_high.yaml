# Hypothesis-driven feature (H1 of signal-hunt sprint): MES first-30-min
# RTH session high, carried forward through the rest of the session.
#
# Added because the range_break_fade strategy class needs an event-
# anchored opening-range reference. The OR window closes 30 min after
# RTH open; the high is then static for the rest of the session and
# defines the upper breakout/fade trigger zone.

id: mes_or30_high
version: v1
description: >
  Highest 1m bar high within the first 30 minutes of the regular-session
  (XNYS-aligned 09:30–16:00 ET) on MES front-month continuous, carried
  forward through the rest of the session. Bars inside the OR window
  itself and bars outside RTH emit no value.
type: derived
inputs:
  - feature_id: mes_1m_bars
computation:
  type: registered_transform
  transform_id: opening_range_levels
  parameters:
    level: high
    or_window_minutes: 30
    session_calendar: XNYS
cadence: 1m
availability_latency_seconds: 1
derivation: transform
revisable: false
expected_range:
  min: 0.0
  max: 100000.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
