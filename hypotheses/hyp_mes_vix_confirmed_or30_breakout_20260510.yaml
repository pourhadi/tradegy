id: hyp_mes_vix_confirmed_or30_breakout_20260510
title: MES OR30 breakouts continue when VIX is elevated and expanding
status: killed
source: human
created_date: 2026-05-10
last_modified_date: 2026-05-10
author: gpt-5.5
observation: >
  Opening-range breakouts in MES should have better follow-through when the
  broader volatility regime is elevated and rising, because the break is more
  likely to reflect repricing by institutional risk managers than isolated
  local order-book noise.
mechanism: >
  In high or rising VIX regimes, index futures moves are more likely to be
  tied to real cross-asset risk repricing. If the OR30 boundary breaks with
  volume confirmation and no scheduled high-impact event is imminent, late
  liquidity providers and stopped-out mean-reversion traders can chase the
  move, creating continuation.
falsification: >
  Refuted if at least 30 qualifying trades fail the sanity gate, or if
  walk-forward average OOS Sharpe is less than 50% of average IS Sharpe after
  positive IS evidence. Also refuted if removing either VIX gate does not
  degrade performance in a separately pre-registered ablation.
counterparty: >
  Intraday mean-reversion traders fading real repricing and short-horizon
  liquidity providers forced to adjust inventory after confirmed range breaks.
instrument_scope:
  - MES
