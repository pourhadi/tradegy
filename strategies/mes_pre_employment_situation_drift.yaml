# MES pre-employment_situation drift — pure buy-and-hold 24h pre-employment_situation, no ATR stop.
#
# Lucca & Moench (2015) replication. The academic finding is a 24h
# buy-and-hold over the pre-announcement window. The original v1 spec
# had a 3x ATR stop which exited on intraday noise (avg_win 9.6R but
# only 6.7% win rate — most trades hit the stop before the drift
# accumulated). This v2 effectively disables the stop (10x ATR =
# unreachable in normal conditions) and lets the drift play out.
#
# Risk: drawdowns can be large (full session moves). For deployment
# we'd want a hedge or a wider risk-managed version. For edge
# measurement, this is the clean test.

metadata:
  id: mes_pre_employment_situation_drift
  version: 0.1.0
  schema_version: "1.0"
  name: MES pre-employment_situation drift — pure 24h hold, no intraday stop
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_pre_fomc_drift
  description: >
    Same gates as v1; stop loosened to 10x ATR (effectively never
    triggers). Pure buy-and-hold pre-employment_situation. Tier proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: gated_entry
  parameters:
    direction: long
    max_attempts_per_session: 1
  direction: long
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: feature_range
      parameters:
        feature_id: mes_hours_to_next_employment_situation
        lo: 0.5
        hi: 24.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    # Use fixed_ticks at the schema max (200 ticks = 50 pts on MES)
    # rather than atr_multiple. atr_mult 10 still produces tight
    # stops (~15 pts) because MES ATR_14m is ~1.5 pts. fixed_ticks 200
    # gives ~50 pt stop = $250/contract which is large enough that
    # most pre-employment_situation sessions won't hit it.
    method: fixed_ticks
    stop_ticks: 200
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 1000
  time_stop:
    enabled: true
    max_holding_bars: 1440
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions:
    - condition: feature_threshold
      parameters:
        feature_id: mes_hours_to_next_employment_situation
        operator: lt
        threshold: 0.5
      action: exit_market
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
