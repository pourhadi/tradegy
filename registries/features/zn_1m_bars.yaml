# 1-minute OHLCV bars for front-month ZN futures.

id: zn_1m_bars
version: v1
description: >
  1-minute OHLCV bars for CBOT 10-Year Treasury Note futures, sourced from
  zn_1m_ohlcv. The resample transform normalizes timestamps to the repo's
  right-labeled bar-close convention.
type: derived
inputs:
  - source_id: zn_1m_ohlcv
computation:
  type: registered_transform
  transform_id: resample_ohlcv_bars
  parameters:
    cadence: 1m
    bar_close_label: right
    closed: left
cadence: 1m
availability_latency_seconds: 1
derivation: transform
revisable: false
expected_range:
  min: 0.0
  max: 300.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
