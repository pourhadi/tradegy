# Companion feature to mes_regime_label_predicted: the classifier's
# probability (0-1) for the predicted class. Strategies use this to
# gate on label confidence — only deploy when the classifier is sure.

id: mes_regime_confidence
version: v1
description: >
  Distillation-classifier predicted-class probability for MES. Pairs
  with mes_regime_label_predicted; same daily cadence forward-filled
  to 1m bars. Strategies typically gate on
  feature_threshold(operator=gte, threshold=0.6) to ensure the
  classifier was confident enough to deploy.
type: model_backed
inputs:
  - source_id: mes_1m_ohlcv
computation:
  type: registered_transform
  transform_id: column_select
  parameters:
    column: close
cadence: 1d
availability_latency_seconds: 0
derivation: model
revisable: false
expected_range:
  min: 0.0
  max: 1.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
