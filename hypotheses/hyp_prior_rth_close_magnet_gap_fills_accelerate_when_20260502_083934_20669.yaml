kill_reason: |-
  6/6 variants killed at sanity (2026-05-02 auto-test --holdout-months 12).
  Trade counts 1048-1402 (gates fired aggressively, well above 30-floor);
  raw Sharpes -0.26 to -0.67 across the batch. No runtime errors —
  the ATR-gate prompt rule held.
  The "late-session gap-fill into MOC imbalance" premise is wrong for
  MES. By session_position > 0.75 either the gap has already filled
  (no edge to capture) or the move has gone the other way (chasing
  the wrong direction). MOC imbalance is real but doesn't pull MES
  futures back to prior close in the way gap_fill_fade implements it.
  Third consecutive fade kill: open-drive exhaustion (trade-count 482-
  991, Sharpe -0.27 to -0.77), lunchtime range-break fade (trade-count
  482-991, Sharpe -0.33 to -0.77), and now late-session gap-fill
  magnet (trade-count 1048-1402, Sharpe -0.26 to -0.67). The meta-
  observation is robust across three intraday regimes: MES exhibits
  directional persistence and fade-class mechanisms are systematically
  unprofitable in 1m bars. Future hypothesize batches should be biased
  away from intraday-fade mechanisms unless cross-asset or macro-event
  context provides an explicit reversion driver. No post-hoc tuning.
