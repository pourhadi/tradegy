# MES VWAP Reversion — second vertical-slice strategy spec.
#
# Mechanism: long-only fade of intraday extension below session VWAP.
# Enter long when close <= VWAP - 8 ticks; fixed 12-tick stop; exit
# either at +1R via time_stop after 30 minutes or at session end.
#
# Status=draft, tier=proposal_only — not validated. Used to demonstrate
# the session-aware harness + the hypothesis-driven feature-addition
# path (mes_vwap was added because this spec needed it).

metadata:
  id: mes_vwap_reversion
  version: 0.1.0
  schema_version: "1.0"
  name: MES VWAP Reversion (vertical-slice demo)
  status: draft
  created_date: 2026-04-28
  last_modified_date: 2026-04-28
  author: dan
  reviewers: []
  parent_strategy_id: null
  description: >
    Long-only fade of intraday extension below session VWAP on MES.
    Entry when 1m close drops 8 ticks ($2.00) or more below current
    session VWAP; fixed 12-tick stop; time-stop after 30 minutes; one
    attempt per CMES session. The session_aware harness loop resets
    the attempt counter daily.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: vwap_reversion
  parameters:
    vwap_feature_id: mes_vwap
    deviation_threshold_ticks: 8
    tick_size: 0.25
    max_attempts_per_session: 1
  direction: long
  entry_order_type: market
  limit_offset_ticks: 0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: fixed_ticks
    stop_ticks: 12
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 100
  time_stop:
    enabled: true
    max_holding_bars: 30
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions: []
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
