# MES MVP — v1_baseline + trailing ATR with activation_R = 1.0.
#
# Variation on v4: trail does NOT activate until favorable excursion
# exceeds 1.0 × initial-stop-distance (i.e., 1R). Reasoning: trailing
# from entry can convert real winners into breakeven scratches when
# the price first probes favorable then retraces. Waiting for 1R
# before tightening the stop preserves the initial R:R asymmetry until
# the trade has confirmed direction.
#
# Comparison with v4 (no activation): tells us whether eager-trailing
# is leaving money on the table or eating breakeven scratches.

metadata:
  id: mes_mvp_regime_gated_v5_trailing_activation_R
  version: 0.1.0
  schema_version: "1.0"
  name: MES MVP regime-gated OR30 fade — trailing ATR with 1R activation
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_mvp_regime_gated_v4_trailing
  description: >
    Same as v4 with activation_R = 1.0 (trail only after 1R favorable
    excursion). Tier proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: range_break_fade
  parameters:
    upper_level_feature_id: mes_or30_high
    lower_level_feature_id: mes_or30_low
    breakout_lookback_bars: 5
    re_entry_buffer_ticks: 1
    tick_size: 0.25
    max_attempts_per_session: 1
    direction_mode: both
  direction: both
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.10
        hi: 0.85
    - condition: feature_threshold
      parameters:
        feature_id: vix_daily_pctile_252
        operator: lt
        threshold: 0.50
    - condition: feature_threshold
      parameters:
        feature_id: mes_econ_event_quiet_window_flag
        operator: lte
        threshold: 0.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: atr_multiple
    atr_feature_id: mes_atr_14m
    atr_mult: 1.0
    tick_size: 0.25
  adjustment_rules:
    - action: trailing_atr
      atr_feature_id: mes_atr_14m
      multiplier: 1.5
      activation_R: 1.0  # only trail after +1R favorable
      tick_size: 0.25
  hard_max_distance_ticks: 100
  time_stop:
    enabled: true
    max_holding_bars: 60
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions: []
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
