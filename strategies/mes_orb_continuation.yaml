# MES Opening-Range Continuation — H3 of the signal-hunt sprint.
#
# Hypothesis: a confirmed break of the first-30-min RTH range with
# above-average volume continues — institutional flow joining drives
# follow-through. Inverse mechanism to mes_orb_failure_fade (H1, killed
# at sanity); H1's failure mode (fade doesn't work on MES) is consistent
# with continuation being the right side of the trade.
#
# Distinct from mes_momentum_breakout because the trigger is range-
# anchored (event-localized to OR breaks) rather than a sliding 5m
# return on every bar. Volume confirmation excludes thin wicks.
#
# Status=draft, tier=proposal_only.

metadata:
  id: mes_orb_continuation
  version: 0.1.0
  schema_version: "1.0"
  name: MES Opening-Range Continuation (volume-confirmed)
  status: draft
  created_date: 2026-04-30
  last_modified_date: 2026-04-30
  author: dan
  reviewers: []
  parent_strategy_id: null
  description: >
    Enter in the break direction when the 1m close pierces mes_or30_high
    (or mes_or30_low) by ≥ 1 tick AND mes_volume_zscore_20m ≥ 1.0.
    Fixed 12-tick stop, 30-min time-stop, 1 attempt per direction per
    session. Both directions armed.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: range_break_continuation
  parameters:
    upper_level_feature_id: mes_or30_high
    lower_level_feature_id: mes_or30_low
    volume_zscore_feature_id: mes_volume_zscore_20m
    confirmation_buffer_ticks: 1
    volume_zscore_min: 1.0
    tick_size: 0.25
    max_attempts_per_session: 1
    direction_mode: both
  direction: both
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    # Skip the last 30 min so the time_stop and any continuation move
    # have room to play out before session-end flatten.
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_session_position
        lo: 0.10
        hi: 0.85

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: fixed_ticks
    stop_ticks: 12
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 100
  time_stop:
    enabled: true
    max_holding_bars: 30
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions: []
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
