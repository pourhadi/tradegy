id: hyp_prior_rth_close_magnet_gap_fills_accelerate_when_20260502_083934_20669
title: 'Prior-RTH-close magnet: gap fills accelerate when overnight drift unwinds
  in last hour'
status: killed
source: llm_brainstorm
created_date: '2026-05-02'
last_modified_date: '2026-05-02'
author: claude-opus-4-7
observation: When MES opens with a moderate gap (recent gap magnitudes are at p71
  of baseline) and price is still on the gap side of prior_rth_close late in the session
  (session_position > 0.75), the path back toward prior close is faster and more reliable
  than earlier in the day.
mechanism: Index funds and basis traders rebalance against prior settlement; closing-auction-related
  flow on cash equities references prior close as an anchor. As the close approaches,
  residual short-gamma dealer hedging and MOC imbalance estimation pull the futures
  back toward the equity reference price. A late-day position still on the gap side
  faces concentrated reversion flow into the last hour.
falsification: Gap_fill_fade variants gated to xnys_session_position > 0.75 with price
  still > X ATR from prior_rth_close yield Sharpe <= 0.2 over >=50 trades, OR conditional
  60m reversion to prior_rth_close is not larger (t<1) than reversion conditional
  on the same distance earlier in the session (0.25-0.50).
counterparty: MOC imbalance estimators and index rebalancers anchored to cash settlement;
  overnight-momentum holders forced to flatten.
