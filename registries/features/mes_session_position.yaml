# Vital sign 5: fraction-through-current-session for MES bars.
# Time-of-day signal — opening drive, lunch lull, close behavior all
# attach to this. Calendar-aware so DST and holidays are handled.

id: mes_session_position
version: v1
description: >
  Fraction through the current CMES session at each MES 1-minute bar:
  0.0 at session open, 1.0 at session close. Bars outside any CMES
  session (weekends, holidays) are dropped.
type: derived
inputs:
  - feature_id: mes_1m_bars
computation:
  type: registered_transform
  transform_id: session_position
  parameters:
    session_calendar: CMES
cadence: 1m
availability_latency_seconds: 1
derivation: transform
revisable: false
expected_range:
  min: 0.0
  max: 1.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
