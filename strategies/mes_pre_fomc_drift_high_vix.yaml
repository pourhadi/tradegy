metadata:
  id: mes_pre_fomc_drift_high_vix
  version: 0.1.0
  schema_version: '1.0'
  name: "MES pre-FOMC drift \u2014 pure 24h hold, no intraday stop"
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_pre_fomc_drift
  description: 'Same gates as v1; stop loosened to 10x ATR (effectively never triggers).
    Pure buy-and-hold pre-FOMC. Tier proposal_only.

    '
market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []
entry:
  strategy_class: gated_entry
  parameters:
    direction: long
    max_attempts_per_session: 1
  direction: long
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
  - condition: feature_range
    parameters:
      feature_id: mes_hours_to_next_fomc
      lo: 0.5
      hi: 24.0
  - condition: feature_threshold
    parameters:
      feature_id: vix_daily_pctile_252
      operator: gte
      threshold: 0.5
sizing:
  method: fixed_contracts
  parameters:
    contracts: 1
stops:
  initial_stop:
    method: fixed_ticks
    stop_ticks: 200
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 1000
  time_stop:
    enabled: true
    max_holding_bars: 1440
    action_at_time_stop: exit_market
exits:
  profit_targets: []
  invalidation_conditions:
  - condition: feature_threshold
    parameters:
      feature_id: mes_hours_to_next_fomc
      operator: lt
      threshold: 0.5
    action: exit_market
  end_of_session: null
retirement_criteria:
  quantitative_triggers:
  - metric: rolling_20_trade_sharpe
    threshold: -1.0
    action: auto_disable
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20
operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
