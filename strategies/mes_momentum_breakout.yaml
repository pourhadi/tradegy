# MES Momentum Breakout — vertical-slice strategy spec.
#
# Mechanism: enter long on a 0.1%+ 5-minute log return, fixed-tick stop,
# time-stop after 30 minutes. Single attempt per session.
#
# This spec exists primarily to validate the Phase 2+3 vertical slice
# end-to-end on real MES data. It is NOT a production-validated strategy
# and is deliberately status=draft / tier=proposal_only. CPCV /
# walk-forward / parameter sensitivity / human signoff all deferred.

metadata:
  id: mes_momentum_breakout
  version: 0.1.0
  schema_version: "1.0"
  name: MES Momentum Breakout (vertical-slice demo)
  status: draft
  created_date: 2026-04-28
  last_modified_date: 2026-04-28
  author: dan
  reviewers: []
  parent_strategy_id: null
  description: >
    First end-to-end vertical slice through the strategy / spec / harness
    pipeline. Long-only momentum continuation entry on a 5-minute log
    return crossing 0.1%, fixed-tick stop, time-stop exit after 30
    minutes. Single attempt per session. Not validated; lifecycle is
    draft / proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: momentum_breakout
  parameters:
    return_feature_id: mes_5m_log_returns
    entry_threshold: 0.001
    # The MVP harness collapses the entire backtest window into one
    # logical "session", so this caps total attempts across the run.
    # When the harness becomes session-aware this will drop to 1-3.
    max_attempts_per_session: 50000
  direction: long
  entry_order_type: market
  limit_offset_ticks: 0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: fixed_ticks
    stop_ticks: 20
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 100
  time_stop:
    enabled: true
    max_holding_bars: 30
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions: []
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
