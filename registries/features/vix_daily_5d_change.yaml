# 5-day absolute change in VIX daily close.
#
# Phase 1 regime feature. Captures the velocity of vol-regime change.
# A +5 absolute move over 5 days suggests a fresh vol shock entering;
# a -5 absolute move suggests vol compression. Strategies pair this
# with the percentile rank — the absolute level AND the rate of change
# both inform whether to deploy.
#
# Pairs with vix_daily_pctile_252 in the regime classifier feature set.

id: vix_daily_5d_change
version: v1
description: >
  Absolute change in vix_daily_close over the trailing 5 trading days
  (close_t - close_{t-5}). Daily cadence. Output unit: VIX points.
  First 5 rows of the source's coverage are dropped (no lag value).
type: derived
inputs:
  - feature_id: vix_daily_close
computation:
  type: registered_transform
  transform_id: rolling_change
  parameters:
    lag_bars: 5
    column: value
    mode: abs
cadence: 1d
availability_latency_seconds: 0
derivation: transform
revisable: false
expected_range:
  min: -100.0
  max: 100.0
outlier_policy: flag_and_pass
lifecycle_state: in_development
