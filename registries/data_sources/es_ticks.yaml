# Data source registry entry for ES (E-mini S&P 500) tick data.
#
# Schema mirrors trading_platform_docs/02_feature_pipeline.md:315-360.
# Admission status: PROVISIONAL — local-development use only. Live admission
# requires the human review described in 02_feature_pipeline.md:140.

id: es_ticks
version: v1
description: >
  E-mini S&P 500 (ES) front-month continuous trade ticks. Each row is a single
  trade print with a UTC nanosecond timestamp, trade price, and trade size.
type: market_data
provider: local_csv
revisable: false
revision_policy: never_revised
admission_rationale: >
  Tick prints are append-only by exchange convention; no retroactive revisions.
  Source is a static CSV captured at a known moment, so it is point-in-time
  queryable trivially. Determinism is provided by the file checksum.
coverage:
  start_date: 1970-01-01   # placeholder; populated from ingestion receipts
  end_date: 1970-01-01
  gaps: []
cadence: tick
fields:
  - {name: ts, type: timestamp}
  - {name: price, type: float}
  - {name: size, type: int}
timestamp_column: ts
availability_latency:
  median_seconds: 0.0
  p99_seconds: 0.0
  notes: >
    Local CSV — historical replay assumes zero exchange-to-tape latency for
    backtest purposes. This is honest only for non-live use.
licensing:
  live_use: false
  backtest_use: true
  redistribution: false
known_issues: []
audit_history: []
