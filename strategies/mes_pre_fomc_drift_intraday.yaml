# MES pre-FOMC drift — INTRADAY-only.
#
# Per user constraint 2026-05-04: intraday-only positions.
# Captures only the announcement-DAY portion of the Lucca-Moench drift:
# enter at session open on FOMC-statement day, exit at 13:30 ET
# (30 min pre-announcement, 14:00 ET = 18:00 UTC summer / 19:00 UTC
# winter). All within one XNYS session.
#
# This drops the overnight + prior-day portions of the 24h pre-FOMC
# window, keeping only 4-6 hours of intraday hold. Lucca-Moench
# decomposed drift into 24h-prior vs announcement-day-intraday and
# found announcement-day was material.
#
# Pre-registered: 1 spec, 1 parameter set, no tuning. ~56 events
# in MES history.

metadata:
  id: mes_pre_fomc_drift_intraday
  version: 0.1.0
  schema_version: "1.0"
  name: MES pre-FOMC drift — intraday-only (FOMC day session open → T-0.5h)
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_pre_fomc_drift_no_stop
  description: >
    Long MES from XNYS session open on FOMC-statement day to ~30 min
    before announcement (4-6 hour intraday hold). Tier proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: gated_entry
  parameters:
    direction: long
    max_attempts_per_session: 1
  direction: long
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    # Only trade INSIDE the XNYS session (cash-equity hours).
    # Lower bound 0.05 lets the trigger fire on any bar at-or-after
    # session open (the rules-based 09:30 ET start). Upper bound
    # 0.50 keeps entries to morning hours (avoid afternoon entries).
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.05
        hi: 0.50
    # Must be on a FOMC-announcement day, within 0.5-6.5 hours pre-
    # announcement. Standard FOMC announce at 14:00 ET; XNYS open at
    # 09:30 ET = 4.5h pre-announce. Bound the window 0.5h-6.5h to
    # capture the morning-session entries. Excludes the prior day
    # entirely (which would be 14-24h pre-event).
    - condition: feature_range
      parameters:
        feature_id: mes_hours_to_next_fomc
        lo: 0.5
        hi: 6.5

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: fixed_ticks
    stop_ticks: 200  # 50 pts; wide enough to ride drift volatility
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 1000
  time_stop:
    enabled: true
    max_holding_bars: 360  # 6 hours; safety net if invalidation misses
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions:
    # Exit before FOMC announcement crossfire (≤30 min remaining).
    - condition: feature_threshold
      parameters:
        feature_id: mes_hours_to_next_fomc
        operator: lt
        threshold: 0.5
      action: exit_market
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
