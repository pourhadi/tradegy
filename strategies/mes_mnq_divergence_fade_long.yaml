# MES-MNQ divergence fade, long MES when MES is cheap vs MNQ.

metadata:
  id: mes_mnq_divergence_fade_long
  version: 0.1.0
  schema_version: "1.0"
  name: MES-MNQ divergence fade long
  status: retired
  created_date: 2026-05-10
  last_modified_date: 2026-05-10
  author: gpt-5.5
  reviewers: []
  parent_strategy_id: null
  description: >
    KILLED 2026-05-10. Long MES when the MES/MNQ 60-minute ratio z-score is below -2.0, exiting
    when the spread mean-reverts above -0.5 or the time stop fires. Tier
    proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: gated_entry
  parameters:
    direction: long
    max_attempts_per_session: 5
  direction: long
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.05
        hi: 0.90
    - condition: feature_threshold
      parameters:
        feature_id: mes_mnq_ratio_zscore_60m
        operator: lt
        threshold: -2.0
    - condition: feature_threshold
      parameters:
        feature_id: mes_econ_event_quiet_window_flag
        operator: lte
        threshold: 0.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: fixed_ticks
    stop_ticks: 40
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 1000
  time_stop:
    enabled: true
    max_holding_bars: 30
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions:
    - condition: feature_threshold
      parameters:
        feature_id: mes_mnq_ratio_zscore_60m
        operator: gt
        threshold: -0.5
      action: exit_market
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: false
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
