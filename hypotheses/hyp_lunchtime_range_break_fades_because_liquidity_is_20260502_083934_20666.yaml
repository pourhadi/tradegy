id: hyp_lunchtime_range_break_fades_because_liquidity_is_20260502_083934_20666
title: Lunchtime range-break fades because liquidity is thin and breakouts lack follow-through
status: killed
source: llm_brainstorm
created_date: '2026-05-02'
last_modified_date: '2026-05-02'
author: claude-opus-4-7
observation: Between session_position ~0.45 and ~0.65 (US lunch hour for XNYS), volume
  z-score is typically negative and breakouts of the prior 30-minute range disproportionately
  fail to extend, retracing back into the range within 15 minutes.
mechanism: During the lunch lull, real-money flow pauses; remaining participants are
  HFTs and small directional players. Stop-runs can pierce local highs/lows but there
  is no follow-on institutional flow to sustain the break. Liquidity providers fade
  the extension knowing imbalance is transient. After ~15 minutes price typically
  returns inside the prior range.
falsification: Variants of range_break_fade gated to xnys_session_position in [0.45,0.65]
  with mes_volume_zscore_20m < 0 produce Sharpe <= 0.2 over >=50 trades, OR median
  15m reversion conditional on the break is <= median unconditional reversion in same
  window.
counterparty: Stop-runners and momentum algos providing liquidity to mean-reverting
  market-makers.
