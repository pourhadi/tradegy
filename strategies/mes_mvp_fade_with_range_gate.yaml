# MES MVP — OR30 fade gated on LLM-distilled `range` regime classifier.
#
# This is the test the original brainstorm actually called for: fade
# strategies (range_break_fade) deployed ONLY when the regime classifier
# predicts `range` (class 0) with high confidence. The momentum-version
# (trend_up/trend_down gate) hurt performance; this is the symmetric
# test on the fade side.
#
# Compares against mes_mvp_regime_gated_v1_baseline (Sharpe -0.336,
# VIX-percentile gate). If this version's Sharpe is materially better,
# the LLM-distilled regime classifier IS adding selection value over
# the deterministic VIX gate.
#
# CAVEAT: classifier was trained on full label set (855 sessions); it
# saw test data during training (NOT walk-forward honest). Result is
# directionally informative but not a deployment candidate.

metadata:
  id: mes_mvp_fade_with_range_gate
  version: 0.1.0
  schema_version: "1.0"
  name: MES OR30 fade — LLM-distilled range-regime gate
  status: draft
  created_date: 2026-05-04
  last_modified_date: 2026-05-04
  author: claude-opus-4-7
  reviewers: []
  parent_strategy_id: mes_mvp_regime_gated_v1_baseline
  description: >
    range_break_fade with classifier gate (regime_label_predicted ==
    range AND confidence >= 0.6). Same exit shape as the symmetric-R:R
    baseline. Tier proposal_only.

market_scope:
  market: ES
  instrument: MES
  session: globex
  time_windows: []
  blackout_dates: []
  day_of_week_filter: []

entry:
  strategy_class: range_break_fade
  parameters:
    upper_level_feature_id: mes_or30_high
    lower_level_feature_id: mes_or30_low
    breakout_lookback_bars: 5
    re_entry_buffer_ticks: 1
    tick_size: 0.25
    max_attempts_per_session: 1
    direction_mode: both
  direction: both
  entry_order_type: market
  limit_offset_ticks: 0
  gating_conditions:
    - condition: time_of_session
      parameters:
        session_position_feature_id: mes_xnys_session_position
        lo: 0.10
        hi: 0.85
    # Range regime ONLY (class 0).
    - condition: feature_threshold
      parameters:
        feature_id: mes_regime_label_predicted
        operator: lte
        threshold: 0.0
    # Classifier confidence ≥ 0.6.
    - condition: feature_threshold
      parameters:
        feature_id: mes_regime_confidence
        operator: gte
        threshold: 0.60
    # Belt-and-suspenders scheduled-event quiet still active.
    - condition: feature_threshold
      parameters:
        feature_id: mes_econ_event_quiet_window_flag
        operator: lte
        threshold: 0.0

sizing:
  method: fixed_contracts
  parameters:
    contracts: 1

stops:
  initial_stop:
    method: atr_multiple
    atr_feature_id: mes_atr_14m
    atr_mult: 1.0
    tick_size: 0.25
  adjustment_rules: []
  hard_max_distance_ticks: 100
  time_stop:
    enabled: true
    max_holding_bars: 30
    action_at_time_stop: exit_market

exits:
  profit_targets: []
  invalidation_conditions: []
  end_of_session: null

retirement_criteria:
  quantitative_triggers:
    - {metric: rolling_20_trade_sharpe, threshold: -1.0, action: auto_disable}
  qualitative_triggers: []
  minimum_trades_before_retirement_eligible: 20

operational:
  enabled: true
  live_since: null
  risk_envelope:
    max_concurrent_instances: 1
    max_daily_loss_pct: 1.5
    max_weekly_loss_pct: 3.0
  incompatible_with: []
  tier: proposal_only
